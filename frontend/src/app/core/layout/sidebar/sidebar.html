<aside class="w-64 bg-slate-900 flex flex-col h-full flex-shrink-0 relative z-20 shadow-[4px_0_12px_rgba(0,0,0,0.1)]">
  <!-- Small gap at the top to breathe -->
  <div class="h-4 shrink-0"></div>

  <!-- Navigation -->
  <nav class="flex-1 overflow-y-auto px-4 space-y-1.5">
    <a 
      routerLink="/dashboard" 
      routerLinkActive="bg-blue-600 text-white shadow-md shadow-blue-900/20" 
      [routerLinkActiveOptions]="{exact: true}"
      [class.text-slate-400]="true"
      class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium hover:bg-slate-800 hover:text-white transition-all cursor-pointer">
      <svg width="22" height="22" fill="none" class="opacity-80" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
      Inicio
    </a>
    
    <a 
      routerLink="/flights" 
      routerLinkActive="bg-blue-600 text-white shadow-md shadow-blue-900/20" 
      [class.text-slate-400]="true"
      class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium hover:bg-slate-800 hover:text-white transition-all cursor-pointer">
      <svg width="22" height="22" fill="none" class="opacity-80" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
      Vuelos
    </a>
    
    <a 
      routerLink="/reservations" 
      routerLinkActive="bg-blue-600 text-white shadow-md shadow-blue-900/20" 
      [class.text-slate-400]="true"
      class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium hover:bg-slate-800 hover:text-white transition-all cursor-pointer">
      <svg width="22" height="22" fill="none" class="opacity-80" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
      Reservas
    </a>
  </nav>

  <!-- Footer Info -->
  <div class="px-6 py-5 bg-slate-950/40 text-xs text-slate-500 font-medium tracking-wide">
    <p>SkyLine Platforms Inc.</p>
    <p class="mt-0.5 opacity-60">Version 2.4.1</p>
  </div>
</aside>
