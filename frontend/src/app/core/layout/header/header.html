<header class="h-16 w-full bg-white border-b border-gray-200 flex items-center justify-between px-6 shrink-0 z-10 relative">
  <!-- Left side: Page context -->
  <div class="flex items-center">
    <span class="text-lg font-bold tracking-tight text-gray-800">
      Panel de Control
    </span>
  </div>

  <!-- Right side: Auth area -->
  <div class="flex items-center gap-6">
    <div class="text-right hidden sm:block">
      <p class="text-sm font-medium text-gray-800">
        Bienvenido, <span class="font-bold text-gray-900">{{ user?.name ?? 'Usuario' }}</span>
      </p>
      <p class="text-xs text-gray-500 font-medium">{{ user?.role ?? 'Personal' }}</p>
    </div>
    
    <!-- Divider -->
    <div class="w-px h-5 bg-gray-200 hidden sm:block"></div>
    
    <!-- Logout Button -->
    <button 
      (click)="logout()" 
      class="flex items-center gap-2 px-3 py-2 rounded-md text-sm font-medium text-gray-600 hover:text-rose-600 hover:bg-gray-50 transition-colors duration-200 cursor-pointer"
      aria-label="Cerrar Sesión"
    >
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
      </svg>
      <span class="hidden md:block">Cerrar Sesión</span>
    </button>
  </div>
</header>
