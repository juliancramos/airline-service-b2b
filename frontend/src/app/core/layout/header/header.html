<header class="h-16 w-full bg-white border-b border-gray-200 flex items-center justify-between px-6 shrink-0 shadow-sm z-10 relative">
  <!-- Left side: App Name/Logo -->
  <div class="flex items-center gap-3">
    <!-- Geometric Logo representation -->
    <div class="w-8 h-8 rounded bg-blue-600 flex items-center justify-center text-white font-bold shadow-sm">
      V
    </div>
    <span class="text-xl font-bold tracking-tight text-slate-800">
      Voyager <span class="text-blue-600 font-semibold">Ops</span>
    </span>
  </div>

  <!-- Right side: Auth area -->
  <div class="flex items-center gap-6">
    <div class="text-right hidden sm:block">
      <p class="text-sm font-medium text-slate-800">
        Bienvenido, <span class="font-bold">{{ user?.name ?? 'Usuario' }}</span>
      </p>
      <p class="text-xs text-slate-500 font-medium">{{ user?.role ?? 'Personal' }}</p>
    </div>
    
    <!-- Divider -->
    <div class="w-px h-6 bg-gray-200 hidden sm:block"></div>
    
    <!-- Logout Button -->
    <button 
      (click)="logout()" 
      class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-medium text-slate-600 hover:text-rose-600 hover:bg-rose-50 transition-colors duration-200 cursor-pointer"
      aria-label="Cerrar Sesión"
    >
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
      </svg>
      <span class="hidden md:block">Cerrar Sesión</span>
    </button>
  </div>
</header>
