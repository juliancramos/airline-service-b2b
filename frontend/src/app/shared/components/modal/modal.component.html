<div *ngIf="isOpen" class="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-50 backdrop-blur-sm animate-fade-in font-sans">
  
  <!-- Content Box -->
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] overflow-hidden flex flex-col mx-4 transform transition-all scale-100">
    
    <!-- Modal Header -->
    <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between shrink-0 bg-white">
      <h3 class="text-xl font-bold text-gray-900 tracking-tight">{{ title }}</h3>
      <button 
        (click)="onClose()" 
        class="text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full p-2 transition-colors cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500"
        aria-label="Cerrar modal"
      >
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Content Injection Area -->
    <div class="flex-1 overflow-y-auto bg-gray-50/30">
      <ng-content></ng-content>
    </div>

  </div>
</div>
